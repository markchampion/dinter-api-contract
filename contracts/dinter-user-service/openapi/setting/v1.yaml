openapi: 3.0.3
info:
  title: Dinter Preferences & Settings API
  version: 1.0.0
servers:
  - url: https://api.dinter.example.com
    description: Production
  - url: http://localhost:8080
    description: Local
tags:
  - name: Preferences
    description: Manage discovery preferences and app settings for the authenticated user
security:
  - bearerAuth: []

paths:
  /v1/preferences/me:
    get:
      tags: [Preferences]
      summary: Get my discovery preferences
      operationId: getMyPreferences
      responses:
        "200":
          description: Current user's preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"
              examples:
                example:
                  value:
                    userId: d479a1fb-a512-4759-89f4-2891131d04b5
                    ageMin: 22
                    ageMax: 33
                    preferredGenderIds: [1, 2]
                    preferredIntent: "DATING"
                    maxDistanceKm: 50
                    minSharedVibes: 2
                    discoveryEnabled: true
                    locationSharingEnabled: true
                    distanceUnit: KM
                    createdAt: "2026-01-07T10:00:00Z"
                    updatedAt: "2026-01-07T10:05:00Z"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

    patch:
      tags: [Preferences]
      summary: Update my discovery preferences
      description: >
        Partially update discovery preferences. Omitted fields are left unchanged.
        Arrays are **authoritative** when provided: send an empty array to clear.
      operationId: patchMyPreferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchUserPreferences"
            examples:
              example:
                value:
                  ageMin: 21
                  ageMax: 30
                  preferredGenderIds: [1, 2]
                  preferredIntent: "DATING"
                  maxDistanceKm: 25
                  minSharedVibes: 1
                  discoveryEnabled: true
                  locationSharingEnabled: true
                  distanceUnit: KM
      responses:
        "200":
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          description: Validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ValidationError" }

  /v1/settings/me:
    get:
      tags: [Preferences]
      summary: Get my app settings
      operationId: getMySettings
      responses:
        "200":
          description: Current user's app settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
              examples:
                example:
                  value:
                    userId: d479a1fb-a512-4759-89f4-2891131d04b5
                    languageCode: en
                    darkMode: false
                    locationSharingEnabled: true
                    pushNotificationsEnabled: true
                    createdAt: "2026-01-07T10:00:00Z"
                    updatedAt: "2026-01-07T10:05:00Z"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

    patch:
      tags: [Preferences]
      summary: Update my app settings
      description: >
        Partially update app settings. Omitted fields are left unchanged.
      operationId: patchMySettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchUserSettings"
            examples:
              example:
                value:
                  languageCode: th
                  darkMode: true
                  pushNotificationsEnabled: false
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          description: Validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ValidationError" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    DistanceUnit:
      type: string
      enum: [KM, MI]

    UserPreferences:
      type: object
      additionalProperties: false
      required:
        - userId
        - ageMin
        - ageMax
        - preferredGenderIds
        - preferredIntent
        - maxDistanceKm
        - minSharedVibes
        - discoveryEnabled
        - locationSharingEnabled
        - distanceUnit
        - createdAt
        - updatedAt
      properties:
        userId:
          type: string
          format: uuid
        ageMin:
          type: integer
          minimum: 18
          maximum: 99
        ageMax:
          type: integer
          minimum: 18
          maximum: 99
        preferredGenderIds:
          type: array
          description: Complete set of preferred gender IDs; empty array means no filter
          items:
            type: integer
            minimum: 1
        preferredIntent:
          type: string
          description: Complete set of preferred intent IDs; empty array means no filter
        maxDistanceKm:
          type: integer
          minimum: 1
          maximum: 500
        minSharedVibes:
          type: integer
          minimum: 0
          maximum: 10
        discoveryEnabled:
          type: boolean
          description: Whether the user participates in discovery (can see/and be seen depending on product rules)
        locationSharingEnabled:
          type: boolean
          description: Whether distance-based discovery is enabled for this user
        distanceUnit:
          $ref: "#/components/schemas/DistanceUnit"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PatchUserPreferences:
      type: object
      additionalProperties: false
      properties:
        ageMin:
          type: integer
          minimum: 18
          maximum: 99
        ageMax:
          type: integer
          minimum: 18
          maximum: 99
        preferredGenderIds:
          type: array
          description: Authoritative when provided; send [] to clear
          items:
            type: integer
            minimum: 1
        preferredIntent:
          type: string
          description: Authoritative when provided; send [] to clear
        maxDistanceKm:
          type: integer
          minimum: 1
          maximum: 500
        minSharedVibes:
          type: integer
          minimum: 0
          maximum: 10
        discoveryEnabled:
          type: boolean
        locationSharingEnabled:
          type: boolean
        distanceUnit:
          $ref: "#/components/schemas/DistanceUnit"

    UserSettings:
      type: object
      additionalProperties: false
      required:
        - userId
        - languageCode
        - darkMode
        - locationSharingEnabled
        - pushNotificationsEnabled
        - createdAt
        - updatedAt
      properties:
        userId:
          type: string
          format: uuid
        languageCode:
          type: string
          description: BCP-47 language tag (e.g., en, th, en-US)
          minLength: 2
          maxLength: 15
          example: en
        darkMode:
          type: boolean
        locationSharingEnabled:
          type: boolean
          description: App-level location sharing toggle (may also affect discovery if disabled)
        pushNotificationsEnabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PatchUserSettings:
      type: object
      additionalProperties: false
      properties:
        languageCode:
          type: string
          minLength: 2
          maxLength: 15
          description: BCP-47 language tag (e.g., en, th, en-US)
        darkMode:
          type: boolean
        locationSharingEnabled:
          type: boolean
        pushNotificationsEnabled:
          type: boolean

    Error:
      type: object
      properties:
        code:
          type: string
          example: INVALID_REQUEST
        message:
          type: string
          example: Invalid payload
        details:
          type: object
          additionalProperties: true

    ValidationError:
      allOf:
        - $ref: "#/components/schemas/Error"
        - type: object
          properties:
            fieldErrors:
              type: array
              items:
                type: object
                required: [field, message]
                properties:
                  field:
                    type: string
                    example: ageMax
                  message:
                    type: string
                    example: Must be greater than or equal to ageMin
